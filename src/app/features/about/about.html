<div class="bg-base-100 shadow-xl border border-base-300 p-8 md:p-12 font-mono text-sm">

  <header class="border-b-4 border-primary pb-6 mb-8 flex justify-between items-end">
    <h1 class="text-4xl font-black tracking-tighter text-primary uppercase">MAN(1)</h1>
    <p class="opacity-50 text-xs font-bold tracking-widest uppercase">System Profile</p>
  </header>

  <div class="space-y-10">
    @for (section of profile(); track section.heading) {
    <section>
      <h2 class="text-xl font-bold text-accent uppercase tracking-widest mb-4">
        {{ section.heading }}
      </h2>

      <div class="pl-0 md:pl-8">
        <ul class="list-none space-y-3">
          @for (item of section.content; track item) {
          <li class="flex gap-4">
            <span class="text-primary opacity-30 select-none">~</span>
            <span class="leading-relaxed">{{ item }}</span>
          </li>
          }
        </ul>
      </div>
    </section>
    }
  </div>

  <footer
    class="mt-12 pt-6 border-t-4 border-primary flex justify-between items-center text-xs font-bold uppercase tracking-widest">
    <span>END OF FILE</span>
    <span class="animate-pulse bg-primary w-3 h-4 inline-block"></span>
  </footer>

</div>
