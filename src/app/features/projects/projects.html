<div class="bg-base-100 shadow-xl border border-base-300 p-6 font-mono text-sm">

  <header class="border-b border-base-300 pb-4 mb-6 flex justify-between items-end">
    <div>
      <p class="text-accent font-bold">samy@portfolio ~ %</p>
      <h1 class="text-2xl font-black tracking-tighter text-primary mt-2 uppercase">./execute_projects.sh</h1>
    </div>
    <p class="opacity-50 text-xs">STATUS: <span class="text-success">OK</span></p>
  </header>

  <div class="space-y-8">
    @for (project of projectsList(); track project.name) {
    <article class="group">
      <div class="flex justify-between items-baseline mb-1">
        <h2 class="text-lg font-bold text-primary group-hover:text-accent transition-colors">
          > {{ project.name }}
        </h2>
        <span class="opacity-50 text-xs">[{{ project.year }}]</span>
      </div>

      <p class="opacity-70 mb-2">> Stack: {{ project.tech }}</p>
      <p class="pl-4 border-l-2 border-base-300 opacity-90">
        {{ project.description }}
      </p>
    </article>
    }
  </div>

  <footer class="mt-8 pt-4 border-t border-base-300 text-xs opacity-50 flex gap-2">
    <span class="animate-pulse">_</span>
    <span>Awaiting input...</span>
  </footer>
</div>
