<main class="flex items-center justify-center min-h-screen p-4 md:p-8">
  <div
    class="bg-base-100 shadow-2xl p-8 md:p-16 w-full max-w-5xl flex flex-col justify-between relative overflow-hidden border border-base-200">

    <header class="flex flex-col md:flex-row md:justify-between mb-16 relative z-10">
      <div class="mb-6 md:mb-0">
        <h1 class="text-4xl md:text-6xl font-black tracking-tighter text-primary uppercase">
          {{ certificate().title }}
        </h1>
        <p class="text-sm font-semibold tracking-widest uppercase opacity-60 mt-2">
          {{ certificate().subtitle }}
        </p>
      </div>

      <div class="text-left md:text-right text-xs opacity-80 flex flex-col justify-end">
        <p class="uppercase tracking-widest font-bold">{{ certificate().authority }}</p>
        <p class="font-mono mt-1 text-accent font-bold">{{ certificate().url }}</p>
      </div>
    </header>

    <section class="flex-grow flex w-full my-8 min-h-[400px] border-y border-base-300" aria-hidden="true">
      <div class="w-1/2 ruled-pattern border-r border-base-300"></div>
      <div class="w-1/2 gold-pattern shadow-inner relative">
        <div class="absolute inset-0 bg-gradient-to-r from-black/10 via-transparent to-black/20"></div>
      </div>
    </section>

    <footer class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm pt-12 relative z-10">
      <div class="flex flex-col gap-6 md:flex-row md:justify-between items-start">
        <div>
          <h2 class="font-light tracking-widest uppercase opacity-60 text-[10px] mb-1">Tech Stack</h2>
          <p class="font-bold text-primary text-lg">{{ certificate().stack }}</p>
          <p class="font-mono text-xs opacity-70 mt-1 uppercase">{{ certificate().developer }}</p>
        </div>
        <div class="md:text-right">
          <h2 class="font-light tracking-widest uppercase opacity-60 text-[10px] mb-1">Date Verified</h2>
          <p class="font-mono text-base font-bold">{{ certificate().date }}</p>
        </div>
      </div>

      <div class="flex justify-between items-end md:justify-end md:gap-16 mt-8 md:mt-0">
        <div
          class="w-20 h-20 bg-primary flex items-center justify-center text-[10px] text-base-100 font-mono tracking-widest">
          [ DATA ]
        </div>
        <div class="text-right">
          <h2 class="font-light tracking-widest uppercase opacity-60 text-[10px] mb-3">Authentication</h2>
          <p class="font-serif text-3xl italic text-primary signature-font">
            {{ certificate().certifiedBy }}
          </p>
        </div>
      </div>
    </footer>
  </div>
</main>
